<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Grown Telephone</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #e94560;
      --text: #eaeaea;
      --muted: #888;
      --radius: 12px;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .screen { display: none; width: 100%; max-width: 480px; }
    .screen.active { display: flex; flex-direction: column; gap: 1rem; }

    h1 { font-size: 1.8rem; font-weight: 800; color: var(--accent); text-align: center; }
    h2 { font-size: 1.1rem; font-weight: 600; text-align: center; color: var(--muted); }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 2px solid #333;
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1.1rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    button {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #333; color: var(--text); }

    .share-box {
      display: flex;
      gap: 0.5rem;
    }
    .share-box input { flex: 1; font-size: 0.8rem; }
    .share-box button { width: auto; padding: 0.75rem 1rem; font-size: 0.85rem; }

    .player-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
    .player-list li {
      background: var(--bg);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .player-list li.me { color: var(--text); font-weight: 600; }

    /* Drawing screen */
    #draw-screen { padding: 0; gap: 0; }
    #draw-prompt {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      background: var(--surface);
    }
    #canvas {
      width: 100%;
      touch-action: none;
      display: block;
      background: #fff;
      cursor: crosshair;
    }
    #draw-toolbar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      background: var(--surface);
      align-items: center;
    }
    .color-swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
    }
    .color-swatch.selected { border-color: #fff; }
    #stroke-size { flex: 1; accent-color: var(--accent); }
    #eraser-btn { width: auto; padding: 0.4rem 0.75rem; font-size: 0.85rem; }
    #draw-submit { border-radius: 0; }

    /* Guess screen */
    #guess-img { width: 100%; border-radius: var(--radius); display: block; }

    /* Wait screen */
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Reveal screen */
    .chain { display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; max-height: 70dvh; }
    .chain-entry { background: var(--surface); border-radius: var(--radius); padding: 1rem; }
    .chain-entry .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .chain-entry .chain-text { font-size: 1.1rem; }
    .chain-entry img { width: 100%; border-radius: 8px; display: block; }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby-screen" class="screen">
  <h1>Grown Telephone</h1>
  <div class="card">
    <p style="font-size:0.9rem;color:var(--text);font-weight:600;margin-bottom:0.4rem;">Step 1 — Share this link</p>
    <p style="font-size:0.8rem;color:var(--muted);margin-bottom:0.75rem;">Each person must open this link in their own browser. Do not share the URL from your address bar.</p>
    <div class="share-box">
      <input id="share-link" type="text" readonly />
      <button class="btn-primary" onclick="copyLink()">Copy</button>
    </div>
  </div>
  <div class="card">
    <p style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;">Players (<span id="player-count">1</span>):</p>
    <ul class="player-list" id="player-list">
      <li class="me">You</li>
    </ul>
  </div>
  <button class="btn-primary" id="start-btn" disabled onclick="startGame()">
    Waiting for players… (need 2+)
  </button>
</div>

<!-- WRITE -->
<div id="write-screen" class="screen">
  <h1>Your phrase</h1>
  <h2>Write anything — the weirder the better</h2>
  <input type="text" id="phrase-input" placeholder="e.g. a cat playing bagpipes" maxlength="120" />
  <button class="btn-primary" id="phrase-submit" onclick="submitPhrase()">Submit</button>
</div>

<!-- DRAW -->
<div id="draw-screen" class="screen">
  <div id="draw-prompt"></div>
  <canvas id="canvas"></canvas>
  <div id="draw-toolbar">
    <div class="color-swatch selected" style="background:#000" data-color="#000000" onclick="pickColor(this)"></div>
    <div class="color-swatch" style="background:#e94560" data-color="#e94560" onclick="pickColor(this)"></div>
    <div class="color-swatch" style="background:#0f3460" data-color="#0f3460" onclick="pickColor(this)"></div>
    <div class="color-swatch" style="background:#f5a623" data-color="#f5a623" onclick="pickColor(this)"></div>
    <div class="color-swatch" style="background:#7ed321" data-color="#7ed321" onclick="pickColor(this)"></div>
    <input id="stroke-size" type="range" min="2" max="30" value="6" />
    <button class="btn-secondary" id="eraser-btn" onclick="toggleEraser()">Eraser</button>
  </div>
  <button class="btn-primary" id="draw-submit" disabled onclick="submitDrawing()">
    Draw something first
  </button>
</div>

<!-- GUESS -->
<div id="guess-screen" class="screen">
  <h1>What is this?</h1>
  <div class="card" style="padding:0;overflow:hidden;">
    <img id="guess-img" alt="Drawing to guess" />
  </div>
  <input type="text" id="guess-input" placeholder="Your best guess…" maxlength="120" />
  <button class="btn-primary" onclick="submitGuess()">Submit</button>
</div>

<!-- WAIT -->
<div id="wait-screen" class="screen" style="align-items:center;gap:1.5rem;">
  <h1>Grown Telephone</h1>
  <div class="spinner"></div>
  <h2 id="wait-msg">Waiting for other players…</h2>
</div>

<!-- REVEAL -->
<div id="reveal-screen" class="screen">
  <h1>The chain</h1>
  <div class="chain" id="chain-container"></div>
</div>

<script>
const API = 'https://grown-telephone-fn.azurewebsites.net/api';

// --- Identity ---
const params = new URLSearchParams(location.search);

let gameId = params.get('gameId');
let playerId = params.get('playerId');
let isCreator = false;

if (!gameId) {
  gameId = crypto.randomUUID();
  playerId = crypto.randomUUID();
  isCreator = true;
  history.replaceState(null, '', `?gameId=${gameId}&playerId=${playerId}`);
} else if (!playerId) {
  playerId = crypto.randomUUID();
  history.replaceState(null, '', `?gameId=${gameId}&playerId=${playerId}`);
}

// --- Screen management ---
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// --- Lobby ---
let pollInterval = null;

function copyLink() {
  const joinUrl = `${location.origin}${location.pathname}?gameId=${gameId}`;
  navigator.clipboard.writeText(joinUrl).catch(() => {});
  document.querySelector('.share-box button').textContent = 'Copied!';
  setTimeout(() => document.querySelector('.share-box button').textContent = 'Copy', 2000);
}

async function pollLobby() {
  const state = await api('GET', `game-state?gameId=${gameId}&playerId=${playerId}`);
  document.getElementById('player-count').textContent = state.playerCount;
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  for (let i = 0; i < state.playerCount; i++) {
    const li = document.createElement('li');
    li.textContent = i === 0 ? 'Player 1 (host)' : `Player ${i + 1}`;
    list.appendChild(li);
  }
  const btn = document.getElementById('start-btn');
  if (state.playerCount >= 2) {
    btn.disabled = false;
    btn.textContent = 'Start Game';
  }
  if (state.phase === 'active') {
    clearInterval(pollInterval);
    enterGameLoop();
  }
}

async function startGame() {
  await api('GET', `game-state?gameId=${gameId}&playerId=${playerId}&start=true`);
  clearInterval(pollInterval);
  enterGameLoop();
}

// --- Game loop ---
async function enterGameLoop() {
  const task = await api('GET', `get-task?gameId=${gameId}&playerId=${playerId}`);
  if (task.type === 'wait') {
    show('wait-screen');
    pollInterval = setInterval(enterGameLoop, 3000);
    return;
  }
  if (task.type === 'write') {
    show('write-screen');
  } else if (task.type === 'draw') {
    setupCanvas(task.prompt);
    show('draw-screen');
    resizeCanvas();
  } else if (task.type === 'guess') {
    document.getElementById('guess-img').src = task.blobUrl;
    show('guess-screen');
  }
}

async function pollForReveal() {
  const state = await api('GET', `game-state?gameId=${gameId}&playerId=${playerId}`);
  if (state.phase === 'reveal') {
    clearInterval(pollInterval);
    showReveal();
  }
}

// --- Write ---
async function submitPhrase() {
  const text = document.getElementById('phrase-input').value.trim();
  if (!text) return;
  document.getElementById('phrase-submit').disabled = true;
  await api('POST', `submit-text?gameId=${gameId}&playerId=${playerId}`, { text });
  show('wait-screen');
  pollInterval = setInterval(pollForReveal, 3000);
}

// --- Canvas drawing ---
let drawing = false;
let hasStroke = false;
let erasing = false;
let currentColor = '#000000';

function setupCanvas(prompt) {
  document.getElementById('draw-prompt').textContent = `Draw: "${prompt}"`;
  hasStroke = false;
  erasing = false;
  const btn = document.getElementById('draw-submit');
  btn.disabled = true;
  btn.textContent = 'Draw something first';
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function resizeCanvas() {
  const canvas = document.getElementById('canvas');
  const w = canvas.parentElement.clientWidth;
  const h = Math.min(w, window.innerHeight * 0.5);
  const ctx = canvas.getContext('2d');
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width = w;
  canvas.height = h;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  ctx.putImageData(img, 0, 0);
}

function canvasPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * (canvas.width / rect.width),
    y: (src.clientY - rect.top) * (canvas.height / rect.height),
  };
}

function pickColor(swatch) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  swatch.classList.add('selected');
  currentColor = swatch.dataset.color;
  erasing = false;
  document.getElementById('eraser-btn').textContent = 'Eraser';
}

function toggleEraser() {
  erasing = !erasing;
  document.getElementById('eraser-btn').textContent = erasing ? 'Pen' : 'Eraser';
}

(function wireCanvas() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function start(e) {
    e.preventDefault();
    drawing = true;
    const { x, y } = canvasPos(e, canvas);
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function move(e) {
    e.preventDefault();
    if (!drawing) return;
    const { x, y } = canvasPos(e, canvas);
    ctx.lineWidth = document.getElementById('stroke-size').value;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = erasing ? '#ffffff' : currentColor;
    ctx.globalCompositeOperation = erasing ? 'destination-out' : 'source-over';
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
    if (!erasing && !hasStroke) {
      hasStroke = true;
      const btn = document.getElementById('draw-submit');
      btn.disabled = false;
      btn.textContent = 'Submit drawing';
    }
  }

  function end(e) {
    e.preventDefault();
    drawing = false;
    ctx.globalCompositeOperation = 'source-over';
  }

  canvas.addEventListener('pointerdown', start);
  canvas.addEventListener('pointermove', move);
  canvas.addEventListener('pointerup', end);
  canvas.addEventListener('pointercancel', end);
})();

async function submitDrawing() {
  const canvas = document.getElementById('canvas');
  document.getElementById('draw-submit').disabled = true;
  const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
  await fetch(`${API}/submit-drawing?gameId=${gameId}&playerId=${playerId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'image/png' },
    body: blob,
  });
  show('wait-screen');
  pollInterval = setInterval(pollForReveal, 3000);
}

// --- Guess ---
async function submitGuess() {
  const text = document.getElementById('guess-input').value.trim();
  if (!text) return;
  await api('POST', `submit-text?gameId=${gameId}&playerId=${playerId}`, { text });
  show('wait-screen');
  pollInterval = setInterval(pollForReveal, 3000);
}

// --- Reveal ---
async function showReveal() {
  const { entries } = await api('GET', `get-chain?gameId=${gameId}`);
  const container = document.getElementById('chain-container');
  container.innerHTML = '';
  const labels = ['Started with', 'Drew', 'Guessed', 'Drew', 'Guessed', 'Drew', 'Guessed'];
  entries.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'chain-entry';
    const label = labels[i] ?? `Round ${i + 1}`;
    if (entry.type === 'text') {
      div.innerHTML = `<div class="label">${label}</div><div class="chain-text">${entry.content}</div>`;
    } else {
      div.innerHTML = `<div class="label">${label}</div><img src="${entry.content}" alt="drawing" />`;
    }
    container.appendChild(div);
  });
  show('reveal-screen');
}

// --- API helper ---
async function api(method, path, body) {
  const res = await fetch(`${API}/${path}`, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  return res.json();
}

// --- Boot ---
window.addEventListener('resize', () => {
  if (document.getElementById('draw-screen').classList.contains('active')) resizeCanvas();
});

document.getElementById('share-link').value =
  `${location.origin}${location.pathname}?gameId=${gameId}`;

show('lobby-screen');
pollInterval = setInterval(pollLobby, 3000);
pollLobby();
</script>
</body>
</html>
